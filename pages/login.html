<!DOCTYPE html>
<html lang="ru" data-theme="light" data-accessibility="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" data-i18n="meta.login.description" content="Вход в аккаунт DOMIKTUT">
    <title data-i18n="meta.login.title">Вход - DOMIKTUT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/adaptive.css">

    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
    <meta name="theme-color" content="#FF6B35">
</head>
<body>

<header class="header header--auth" data-header>
    <div class="container header__container">
        <a href="../index.html" class="header__logo">
            <svg class="header__logo-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
                <path d="M20 5L5 17.5V35H15V25H25V35H35V17.5L20 5Z" fill="#FF6B35"/>
            </svg>
            <span class="header__logo-text">DOMIKTUT.RU</span>
        </a>
        <a href="register.html" class="btn btn--outline btn--sm" data-i18n="auth.noAccount">Нет аккаунта?</a>
    </div>
</header>

<main id="main-content">
    <section class="auth-section">
        <div class="container">
            <div class="auth-card auth-card--login">
                <div class="auth-card__header">
                    <h1 class="auth-card__title" data-i18n="auth.login.title">Вход в аккаунт</h1>
                    <p class="auth-card__subtitle" data-i18n="auth.login.subtitle">Введите данные для авторизации</p>
                </div>

                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="loginIdentifier" data-i18n="auth.login.identifier">Email или телефон *</label>
                        <input type="text" id="loginIdentifier" name="identifier" required
                               data-i18n-placeholder="auth.login.identifierPlaceholder"
                               placeholder="example@email.com или +375..."
                               autocomplete="username">
                        <span class="form-error" data-error="identifier"></span>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword" data-i18n="auth.login.password">Пароль *</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="loginPassword" name="password" required
                                   data-i18n-placeholder="auth.login.passwordPlaceholder"
                                   placeholder="Введите пароль"
                                   autocomplete="current-password">
                            <button type="button" class="password-toggle" aria-label="Показать пароль">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <path d="M10 4C5 4 2.731 7.113 1.464 9.5a1 1 0 000 .999C2.731 12.887 5 16 10 16s7.269-3.113 8.536-5.5a1 1 0 000-.999C17.269 7.113 15 4 10 4zm0 7a2 2 0 110-4 2 2 0 010 4z" fill="currentColor"/>
                                </svg>
                            </button>
                        </div>
                        <span class="form-error" data-error="password"></span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-option">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span data-i18n="auth.login.remember">Запомнить меня</span>
                        </label>
                        <a href="#" class="form-link" data-i18n="auth.login.forgotPassword">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="btn btn--primary btn--lg btn--full" id="loginSubmit"
                            data-i18n="auth.login.submit">Войти</button>
                </form>

                <p class="auth-card__footer">
                    <span data-i18n="auth.login.noAccount">Нет аккаунта?</span>
                    <a href="register.html" data-i18n="auth.login.register">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </section>
</main>

<footer class="footer footer--auth" data-footer>
    <div class="container">
        <p>&copy; 2024 DOMIKTUT. <span data-i18n="footer.allRights">Все права защищены.</span></p>
    </div>
</footer>

<div class="modal" data-modal="login-error" hidden>
    <div class="modal__content modal__content--error">
        <div class="modal__header">
            <h3 class="modal__title" data-i18n="auth.login.errorTitle">Ошибка входа</h3>
            <button class="modal__close" data-modal-close aria-label="Закрыть">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>
        <div class="modal__body">
            <div class="error-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 8v4M12 16h.01"/>
                </svg>
            </div>
            <p id="loginErrorMessage" data-i18n="auth.login.errorText">Неверный email или пароль</p>
            <div class="modal__footer modal__footer--center">
                <button class="btn btn--primary" data-modal-close data-i18n="common.close">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="../js/auth/login.js"></script>
</body>
</html>
